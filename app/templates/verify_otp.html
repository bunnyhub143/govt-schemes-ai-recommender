{% extends "base.html" %}
{% block title %}Enter OTP - Govt Schemes Advisor{% endblock %}
{% block content %}
<div class="card">
    <h1>Enter OTP</h1>
    <p style="color:#718096; font-size:0.9rem; margin-bottom:1rem;">We've sent a 6-digit code to <strong>{{ email }}</strong>. Enter it below.</p>
    <form method="post" action="{{ url_for('auth.verify_otp') }}">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="username" value="{{ username }}">
        <div class="form-group">
            <label for="otp">OTP *</label>
            <input type="text" id="otp" name="otp" required autocomplete="one-time-code" maxlength="6" pattern="[0-9]*" inputmode="numeric" placeholder="000000">
        </div>
        <button type="submit" class="btn btn-block">Verify & Login</button>
    </form>
    <p class="links"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
</div>
{% endblock %}
