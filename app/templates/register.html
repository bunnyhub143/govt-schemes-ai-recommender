{% extends "base.html" %}
{% block title %}Register - Govt Schemes Advisor{% endblock %}
{% block content %}
<div class="card">
    <h1>User Registration</h1>
    <form method="post" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" id="username" name="username" required autocomplete="username" value="{{ request.form.username or '' }}">
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required autocomplete="email" value="{{ request.form.email or '' }}">
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" max="120" placeholder="e.g. 25" value="{{ request.form.age or '' }}">
        </div>
        <div class="form-group">
            <label for="occupation">Occupation</label>
            <input type="text" id="occupation" name="occupation" placeholder="e.g. Farmer, Student" value="{{ request.form.occupation or '' }}">
        </div>
        <div class="form-group">
            <label for="income">Income (₹/year)</label>
            <input type="number" id="income" name="income" min="0" step="0.01" placeholder="e.g. 150000" value="{{ request.form.income or '' }}">
        </div>
        <button type="submit" class="btn btn-block">Register</button>
    </form>
    <p class="links">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}
