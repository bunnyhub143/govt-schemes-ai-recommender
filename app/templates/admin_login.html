{% extends "base.html" %}
{% block title %}Admin Login - Govt Schemes Advisor{% endblock %}
{% block content %}
<div class="card">
    <h1>Admin Login</h1>
    <form method="post" action="{{ url_for('auth.admin_login') }}">
        <div class="form-group">
            <label for="username">Username *</label>
            <input type="text" id="username" name="username" required autocomplete="username" value="{{ request.form.username or '' }}">
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-block">Login</button>
    </form>
    <p class="links"><a href="{{ url_for('auth.login') }}">User login</a></p>
</div>
{% endblock %}
